<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Log in</title>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@100;200;300;400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at 60% 40%, #e8e0d0 0%, #d6cfc0 40%, #cdc8be 70%, #d4c8bc 100%);
      font-family: 'Inter', sans-serif;
    }

    .card {
      width: 340px;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.13);
    }

    .card-header {
      background: #c8ccd0;
      padding: 10px 18px;
      text-align: right;
      font-size: 13px;
      color: #6b7280;
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      letter-spacing: 0.02em;
    }

    .card-body {
      background: linear-gradient(180deg, #ffffff 60%, #f0f0f0 100%);
      padding: 40px 32px 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    h1 {
      font-size: 30px;
      font-weight: 200;
      color: #b0a89a;
      letter-spacing: 0.08em;
      margin-bottom: 12px;
      font-family: 'Raleway', sans-serif;
    }

    .input-wrap {
      position: relative;
      width: 100%;
    }

    input {
      width: 100%;
      padding: 13px 44px 13px 16px;
      border: none;
      border-radius: 10px;
      background: #f4f1eb;
      font-size: 14px;
      color: #6b7280;
      outline: none;
      font-family: 'Inter', sans-serif;
      font-weight: 300;
    }

    input::placeholder { color: #a09888; }

    input:focus {
      box-shadow: 0 0 0 2px #b0a89a55;
    }

    .icon-user {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #c8bfb5;
      font-size: 18px;
    }

    .btn-signin {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: #6b7a8d;
      color: #d4cfc8;
      font-size: 15px;
      letter-spacing: 0.08em;
      cursor: pointer;
      font-family: 'Raleway', sans-serif;
      font-weight: 300;
      transition: background 0.2s;
      margin-top: 4px;
    }

    .btn-signin:hover { background: #5a6878; }

    .footer-link {
      margin-top: 8px;
      font-size: 13px;
      color: #a09888;
    }

    .footer-link a {
      color: #6b7a8d;
      text-decoration: none;
    }

    .footer-link a:hover { text-decoration: underline; }

    /* Register page (hidden by default) */
    #register-page { display: none; }

    .error-msg {
      color: #c0392b;
      font-size: 13px;
      text-align: center;
      min-height: 18px;
    }
  </style>
</head>
<body>

  <!-- LOGIN PAGE -->
  <div id="login-page">
    <div class="card">
      <div class="card-header">Suckhoo S.</div>
      <div class="card-body">
        <h1>Log in</h1>
        <div class="input-wrap">
          <input type="text" id="login-username" placeholder="Username" />
          <span class="icon-user"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#c8bfb5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg></span>
        </div>
        <div class="input-wrap">
          <input type="password" id="login-password" placeholder="Password" />
        </div>
        <p class="error-msg" id="login-error"></p>
        <button class="btn-signin" onclick="handleLogin()">Sign In</button>
        <p class="footer-link">ยังไม่มีบัญชี? <a href="#" onclick="showRegister()">Register</a></p>
      </div>
    </div>
  </div>

  <!-- REGISTER PAGE -->
  <div id="register-page">
    <div class="card">
      <div class="card-header">Suckhoo S.</div>
      <div class="card-body">
        <h1>Register</h1>
        <div class="input-wrap">
          <input type="text" id="reg-username" placeholder="Username" />
          <span class="icon-user"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#c8bfb5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg></span>
        </div>
        <div class="input-wrap">
          <input type="email" id="reg-email" placeholder="Email" />
        </div>
        <div class="input-wrap">
          <input type="password" id="reg-password" placeholder="Password" />
        </div>
        <div class="input-wrap">
          <input type="password" id="reg-confirm" placeholder="Confirm Password" />
        </div>
        <p class="error-msg" id="reg-error"></p>
        <button class="btn-signin" onclick="handleRegister()">Create Account</button>
        <p class="footer-link">มีบัญชีแล้ว? <a href="#" onclick="showLogin()">Log in</a></p>
      </div>
    </div>
  </div>

  <script>
    // Simple user storage (localStorage สำหรับ demo — จะเปลี่ยนเป็น Firebase ภายหลัง)
    function getUsers() {
      return JSON.parse(localStorage.getItem('users') || '{}');
    }
    function saveUsers(users) {
      localStorage.setItem('users', JSON.stringify(users));
    }

    function showRegister() {
      document.getElementById('login-page').style.display = 'none';
      document.getElementById('register-page').style.display = 'block';
    }

    function showLogin() {
      document.getElementById('register-page').style.display = 'none';
      document.getElementById('login-page').style.display = 'block';
    }

    function handleLogin() {
      const username = document.getElementById('login-username').value.trim();
      const password = document.getElementById('login-password').value;
      const errorEl = document.getElementById('login-error');

      if (!username || !password) {
        errorEl.textContent = 'กรุณากรอก Username และ Password';
        return;
      }

      const users = getUsers();
      if (users[username] && users[username].password === password) {
        errorEl.textContent = '';
        alert('เข้าสู่ระบบสำเร็จ! ยินดีต้อนรับ ' + username);
        // TODO: redirect ไปหน้า dashboard
        // window.location.href = 'dashboard.html';
      } else {
        errorEl.textContent = 'Username หรือ Password ไม่ถูกต้อง';
      }
    }

    function handleRegister() {
      const username = document.getElementById('reg-username').value.trim();
      const email = document.getElementById('reg-email').value.trim();
      const password = document.getElementById('reg-password').value;
      const confirm = document.getElementById('reg-confirm').value;
      const errorEl = document.getElementById('reg-error');

      if (!username || !email || !password || !confirm) {
        errorEl.textContent = 'กรุณากรอกข้อมูลให้ครบ';
        return;
      }
      if (password !== confirm) {
        errorEl.textContent = 'Password ไม่ตรงกัน';
        return;
      }
      if (password.length < 6) {
        errorEl.textContent = 'Password ต้องมีอย่างน้อย 6 ตัวอักษร';
        return;
      }

      const users = getUsers();
      if (users[username]) {
        errorEl.textContent = 'Username นี้มีอยู่แล้ว';
        return;
      }

      users[username] = { email, password };
      saveUsers(users);
      errorEl.textContent = '';
      alert('สมัครสมาชิกสำเร็จ! กรุณา Log in');
      showLogin();
    }
  </script>

</body>
</html>
